# Pinned to stable action versions and Node 20 LTS for reproducible builds.
# Actions: https://github.com/actions/*/releases | Node: https://nodejs.org/en/about/releases/
name: aif-c01-visualizer

on:
  push:
    branches: ['main'] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Audit dependencies (OWASP A06)
        run: npm run audit
        continue-on-error: true

      - name: Build for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES: 'true'


      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
